<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }
        input {
            padding: 8px;
            margin: 8px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Simple Interest Calculator</h1>

    <input type="number" id="principal" placeholder="Enter Principal"><br>
    <input type="number" id="rate" placeholder="Enter Rate (%)"><br>
    <input type="number" id="time" placeholder="Enter Time (years)"><br>

    <button onclick="showInterest()">Calculate</button>

    <p id="result"></p>

    <script>
        const num1=document.getElementById("principal");
        const num2=document.getElementById("rate");
        const num3=document.getElementById("time");
        function showInterest(){
        let result=parseInt(num1.value)*parseInt(num2.value)*parseInt(num3.value)/100;
        document.getElementById("result").textContent="Result " + result;
        }
         </script>

</body>
</html>
