<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overflow Example</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f0f0f0;
  margin: 0;
  padding: 20px;
  text-align: center;
}

.box {
  background-color: blue;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 25px;
  border-radius: 50px;
  transition: all 0.4s ease;
  overflow: hidden;
  height: 150px;
  width: 150px;
  border-radius: 50%;
}
.box img{
  width: 150px;
  height: 150px;
}

</style>
</head>

<body>

<h2>Overflow CSS Feature</h2>
<p>Overflow property values are: visible, hidden, scroll, and auto.</p>

<div class="box">
  <img src="https://images.unsplash.com/photo-1575936123452-b67c3203c357?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aW1hZ2V8ZW58MHx8MHx8fDA%3D">
</div>

</body>
</html>
